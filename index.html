<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AML Course Hub</title>

  <style>
    :root {
      --bg: #0b0a14;
      --bg-2: #120f24;
      --card: #18142f;
      --card-hover: #241c45;
      --accent: #b794f6;
      --accent-2: #8b5cf6;
      --text: #f5f3ff;
      --muted: #c4b5fd;
      --border: #31265f;
      --done: #34d399;
      --shadow: rgba(139, 92, 246, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, #1a1438 0%, var(--bg) 55%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.4rem;
      color: var(--accent);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .panel {
      background: rgba(24, 20, 47, 0.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
      margin-bottom: 24px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-title {
      font-weight: 700;
    }

    .progress-text {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #0f0c1f;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.3s ease;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    button, .continue {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
    }

    .continue {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    button {
      background: #1e193d;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .lesson-card {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-decoration: none;
      color: var(--text);
      transition: 0.2s;
    }

    .lesson-card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px var(--shadow);
    }

    .lesson-card.done {
      border-color: var(--done);
    }

    .lesson-title {
      font-weight: bold;
      font-size: 1.1rem;
    }

    .lesson-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .check {
      float: right;
      color: var(--done);
      display: none;
    }

    .lesson-card.done .check {
      display: inline;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <div class="hero">
      <h1>Applied Machine Learning</h1>
      <p class="subtitle">Course study hub</p>
    </div>

    <div class="panel">
      <div class="progress-header">
        <span class="progress-title">Your progress</span>
        <span class="progress-text" id="progressText">0 / 8 completed</span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="actions">
        <a id="continueBtn" class="continue" href="AMLB/Lecture01.html">Continue</a>
        <button onclick="resetProgress()">Reset</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>

  </main>

  <script>
    const lessons = [
      { id: "lecture1", file: "AMLB/Lecture01.html", title: "Lecture 1", subtitle: "Introduction to ML" },
      { id: "lecture2", file: "AMLB/Lecture02.html", title: "Lecture 2", subtitle: "" },
      { id: "lecture3", file: "AMLB/Lecture03.html", title: "Lecture 3", subtitle: "" },
      { id: "lecture4", file: "AMLB/Lecture04.html", title: "Lecture 4", subtitle: "" },
      { id: "lecture5", file: "AMLB/Lecture05.html", title: "Lecture 5", subtitle: "" },
      { id: "lecture6", file: "AMLB/Lecture06.html", title: "Lecture 6", subtitle: "" },
      { id: "lecture7", file: "AMLB/Lecture07.html", title: "Lecture 7", subtitle: "" },
      { id: "lecture8", file: "AMLB/Lecture08.html", title: "Lecture 8", subtitle: "" }
    ];

    let progress = JSON.parse(localStorage.getItem("aml_progress")) || {};

    function save() {
      localStorage.setItem("aml_progress", JSON.stringify(progress));
    }

    function updateUI() {
      const completed = lessons.filter(l => progress[l.id]).length;
      document.getElementById("progressText").innerText = `${completed} / ${lessons.length} completed`;
      document.getElementById("progressFill").style.width = (completed / lessons.length * 100) + "%";

      const next = lessons.find(l => !progress[l.id]) || lessons[lessons.length - 1];
      document.getElementById("continueBtn").href = next.file;
    }

    function build() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      lessons.forEach(l => {
        const a = document.createElement("a");
        a.href = l.file;
        a.className = "lesson-card";
        if (progress[l.id]) a.classList.add("done");

        a.innerHTML = `
          <span class="check">✔</span>
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-subtitle">${l.subtitle}</div>
        `;

        a.onclick = () => {
          progress[l.id] = true;
          save();
        };

        grid.appendChild(a);
      });
    }

    function resetProgress() {
      localStorage.removeItem("aml_progress");
      progress = {};
      build();
      updateUI();
    }

    build();
    updateUI();
  </script>

</body>
</html>
