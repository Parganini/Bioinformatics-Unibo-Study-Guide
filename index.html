<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Hub</title>
  <style>
    :root {
      --bg: #0b0a14;
      --bg-2: #120f24;
      --card: #18142f;
      --card-hover: #241c45;
      --accent: #b794f6;
      --accent-2: #8b5cf6;
      --text: #f5f3ff;
      --muted: #c4b5fd;
      --border: #31265f;
      --shadow: rgba(139, 92, 246, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, #1a1438 0%, var(--bg) 55%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.4rem;
      color: var(--accent);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 28px;
    }

    .subject-card {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      text-decoration: none;
      color: var(--text);
      transition: 0.22s ease;
    }

    .subject-card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px var(--shadow);
    }

    .subject-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subject-subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .wrap {
        padding: 28px 14px 40px;
      }

      h1 {
        font-size: 1.95rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Study Hub</h1>
      <p class="subtitle">Select a subject</p>
    </section>

    <section class="grid">
      <a class="subject-card" href="AMLB/index.html">
        <div class="subject-title">Applied Machine Learning</div>
        <div class="subject-subtitle">
          Lecture notes, slides, transcripts, recordings, and progress tracking.
        </div>
      </a>

      <a class="subject-card" href="#">
        <div class="subject-title">Another Subject</div>
        <div class="subject-subtitle">
          Placeholder for future course material.
        </div>
      </a>
    </section>
  </main>
</body>
</html>
